name: collect-monthly
# Plan B(疫苗&合成生物月报·混合):GitHub 只抓【在线期刊论文池 + 综述评述池 + ClinicalTrials 管线】→ 经 Pages 提供(固定名 latest-monthly.json)。
# 事件(疫苗/合成生物/交叉)由 Cowork intel-monthly 任务在本地用 daily/*.md 聚合(runner 无 daily/,--online-only 下 events 为空属正常)。
# 出报间隔(≥25天)判断在 Cowork 任务侧本地 monthly-schedule.json;采集端每周日都抓(--online-only 跳间隔+跳本地聚合)。
# 每周日。纯 stdlib、无需 pip。前提:仓库 Settings→Pages→Source = GitHub Actions(共用同一 Pages 站)。

on:
  schedule:
    # 主触发 = cron-job.org 周日北京 ~09:30;以下为 GitHub 自带备份(周日=0)。
    - cron: '7 1 * * 0'          #  1:07 UTC = 北京 09:07 周日
    - cron: '37 1 * * 0'         #  1:37 UTC = 北京 09:37 周日
    - cron: '7 2 * * 0'          #  2:07 UTC = 北京 10:07 周日
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect-monthly
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓期刊/综述/临床在线池(run_monthly --online-only;跳间隔+跳本地聚合,events 空属正常)
        run: |
          DATE=$(date +%F)
          python run_monthly.py --end "$DATE" --online-only

      - name: 生成固定名副本(盖 date 戳供下游校验新鲜度)
        run: |
          DATE=$(date +%F)
          cd prepared
          python3 -c "import json; d=json.load(open('prepared-monthly-$DATE.json')); d['date']='$DATE'; json.dump(d, open('latest-monthly.json','w'), ensure_ascii=False)"

      - name: 提交在线池回仓库
        run: |
          DATE=$(date +%F)
          git config user.name  "intel-collector-bot"
          git config user.email "intel-collector-bot@users.noreply.github.com"
          git add prepared/prepared-monthly-"$DATE".json prepared/latest-monthly.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "monthly online $DATE"
            git push
          fi

      - name: 校验产物
        run: |
          DATE=$(date +%F)
          if [ ! -s "prepared/prepared-monthly-$DATE.json" ]; then
            echo "::error::prepared-monthly-$DATE.json 未产出 —— 在线抓取失败"
            exit 1
          fi
          echo "✅ prepared-monthly-$DATE.json 已产出"

      - name: 组装 Pages 站点(glob 全部 latest-*.json,与日报/周报共存)
        run: |
          rm -rf _site
          mkdir -p _site/prepared
          cp prepared/latest-*.json _site/prepared/ 2>/dev/null || true
          echo "发布到 Pages 的 latest-*:"; ls -1 _site/prepared/

      - name: 配置 Pages
        uses: actions/configure-pages@v5
      - name: 上传 Pages 制品(_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  # 独立部署 job:跨 4 个 collect-* 共享并发组 → Pages 部署串行排队,互不取消/挤掉
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
