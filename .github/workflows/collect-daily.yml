name: collect-daily
# Plan B:GitHub 常开 runner 跑日报采集 → prepared 提交回仓库 + 经 **GitHub Actions 显式部署到 Pages**
# (取代不可靠的 "deploy from branch" 自动构建;每次采集完在本 workflow 里可靠发布,Actions 页可见)。
# 纯标准库,无需 pip。run_daily.py 用北京时区(util.CN_TZ)算日期。
# 前提:仓库 Settings → Pages → Source 必须设为 "GitHub Actions"。

on:
  schedule:
    # 错时备份(主触发是 cron-job.org 每天北京 06:30;GitHub 自带 cron 不可靠,仅兜底)。
    - cron: '47 22 * * *'        # 22:47 UTC = 北京 06:47
    - cron: '7 23 * * *'         # 23:07 UTC = 北京 07:07
    - cron: '27 23 * * *'        # 23:27 UTC = 北京 07:27
    - cron: '47 23 * * *'        # 23:47 UTC = 北京 07:47
  workflow_dispatch: {}

permissions:
  contents: write                # 提交 prepared 回仓库
  pages: write                   # 部署 Pages
  id-token: write                # Pages 部署所需 OIDC

concurrency:
  group: collect-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 采集(run_daily.py)
        run: python run_daily.py

      - name: 生成固定名副本(供 Cowork 用固定 URL 拉)
        run: |
          DATE=$(date +%F)
          cd prepared
          cp "prepared-daily-$DATE.json"  latest-daily.json
          cp "search-manifest-$DATE.json" latest-manifest.json 2>/dev/null || true
          cp "recent-coverage-$DATE.json" latest-coverage.json 2>/dev/null || true
          cp "source-health-$DATE.json"   latest-health.json   2>/dev/null || true

      - name: 发布固定名副本到 Release(备用下载通道)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd prepared
          gh release create prepared-latest --title "prepared latest" \
            --notes "最新 prepared 固定名副本,每日由 collect-daily 覆盖。" \
            2>/dev/null || true
          gh release upload prepared-latest \
            latest-daily.json latest-manifest.json latest-coverage.json latest-health.json \
            --clobber

      - name: 提交 prepared 回仓库(存档 + 供 git 核对)
        run: |
          DATE=$(date +%F)
          git config user.name  "intel-collector-bot"
          git config user.email "intel-collector-bot@users.noreply.github.com"
          git add -A prepared/
          if git diff --cached --quiet; then
            echo "本次 prepared 无变化"
          else
            git commit -m "daily prepared $DATE"
            git push
          fi

      - name: 校验产物(没产出就让 workflow 失败)
        run: |
          DATE=$(date +%F)
          if [ ! -s "prepared/prepared-daily-$DATE.json" ]; then
            echo "::error::prepared-daily-$DATE.json 未产出 —— 采集失败,请查上一步日志"
            exit 1
          fi
          echo "✅ prepared-daily-$DATE.json 已产出"

      # ---------- 显式部署 Pages(核心改动:取代 deploy-from-branch 的不可靠自动构建) ----------
      - name: 组装 Pages 站点(只放 4 个 latest-*.json,保持原 URL 路径 /prepared/)
        run: |
          rm -rf _site
          mkdir -p _site/prepared
          cp prepared/latest-daily.json    _site/prepared/latest-daily.json
          cp prepared/latest-manifest.json _site/prepared/latest-manifest.json 2>/dev/null || true
          cp prepared/latest-coverage.json _site/prepared/latest-coverage.json 2>/dev/null || true
          cp prepared/latest-health.json   _site/prepared/latest-health.json   2>/dev/null || true

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 制品(_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
