name: collect-daily
# Plan B:GitHub 常开 runner 跑日报采集 → prepared 提交回仓库;Cowork 侧 web_fetch 取用。
# 纯标准库,无需 pip。run_daily.py 用北京时区(util.CN_TZ)算日期。

on:
  schedule:
    # 错时多次兜底:GitHub 新增/单一 cron 常漏跑或延迟。排 4 个时段,全部早于 Cowork 08:02 取数窗口,
    # 任一成功即可(同日重复跑是幂等的:无变化不提交)。北京时间见注释。
    - cron: '47 22 * * *'        # 22:47 UTC = 北京 06:47
    - cron: '7 23 * * *'         # 23:07 UTC = 北京 07:07
    - cron: '27 23 * * *'        # 23:27 UTC = 北京 07:27
    - cron: '47 23 * * *'        # 23:47 UTC = 北京 07:47
  workflow_dispatch: {}          # 支持 Actions 页手动触发(测试 / 补跑)

permissions:
  contents: write                # 允许把 prepared 提交回仓库
  pages: write                   # 允许显式请求 Pages 重建(GITHUB_TOKEN 的 push 不会自动触发 Pages)

concurrency:
  group: collect-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 采集(run_daily.py)
        run: python run_daily.py

      - name: 生成固定名副本(供 Cowork 用固定 URL 拉,绕开 web_fetch provenance)
        run: |
          DATE=$(date +%F)
          cd prepared
          cp "prepared-daily-$DATE.json"  latest-daily.json
          cp "search-manifest-$DATE.json" latest-manifest.json 2>/dev/null || true
          cp "recent-coverage-$DATE.json" latest-coverage.json 2>/dev/null || true
          cp "source-health-$DATE.json"   latest-health.json   2>/dev/null || true

      - name: 发布固定名副本到 Release(绕开 raw /main ref 解析滞后,下游用稳定 download URL 取数)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd prepared
          # 固定 tag,首次创建、之后复用;资产每天 --clobber 覆盖。
          gh release create prepared-latest --title "prepared latest" \
            --notes "最新 prepared 固定名副本,每日由 collect-daily 覆盖。下游用稳定 download URL 取数。" \
            2>/dev/null || true
          gh release upload prepared-latest \
            latest-daily.json latest-manifest.json latest-coverage.json latest-health.json \
            --clobber

      - name: 提交 prepared 回仓库
        run: |
          DATE=$(date +%F)
          git config user.name  "intel-collector-bot"
          git config user.email "intel-collector-bot@users.noreply.github.com"
          git add -A prepared/
          if git diff --cached --quiet; then
            echo "本次 prepared 无变化(采集失败或无新内容)"
          else
            git commit -m "daily prepared $DATE"
            git push
          fi

      - name: 触发 Pages 重新部署(关键:GITHUB_TOKEN 的 push 不会自动触发 Pages,必须显式请求一次 build)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/justinrao0901-create/intel-collector/pages/builds)
          echo "POST /pages/builds 返回 $code(201=已排队重建;Pages 约 1-2 分钟刷新)"

      - name: 校验产物(没产出就让 workflow 失败、好收到通知)
        run: |
          DATE=$(date +%F)
          if [ ! -s "prepared/prepared-daily-$DATE.json" ]; then
            echo "::error::prepared-daily-$DATE.json 未产出 —— 采集失败,请查上一步日志"
            exit 1
          fi
          echo "✅ prepared-daily-$DATE.json 已产出"
